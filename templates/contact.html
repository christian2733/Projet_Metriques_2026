<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center mb-4">Contactez-moi</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nom & Prénom</label>
                            <input type="text" class="form-control" placeholder="Jean Dupont">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="4" placeholder="Votre message..."></textarea>
                        </div>
                        <button type="button" class="btn btn-primary w-100">Envoyer (Démo)</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
